<!DOCTYPE html>
<html>
  <head>
    <title>Mode Ekstensi</title>
    <style>
      body {
        font-family: sans-serif;
        width: 250px;
        padding: 10px;
      }
      select,
      label {
        width: 100%;
        margin-top: 8px;
      }
      .option-group {
        margin-top: 6px;
        margin-left: 10px;
      }
      button {
        margin-top: 12px;
        width: 100%;
        padding: 8px;
        font-weight: bold;
        background-color: #007bff;
        border: none;
        border-radius: 6px;
        color: white;
        cursor: pointer;
      }
      button:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <h3>Pilih Mode</h3>
    <select id="roleSelect">
      <option value="viewer">Viewer</option>
      <option value="owner">Channel Owner</option>
    </select>

    <div id="viewerOptions" style="display: none">
      <h4 style="margin-bottom: 5px">Opsi tampilan komentar terlarang:</h4>
      <div class="option-group">
        <label
          ><input type="radio" name="filterMode" value="hideWithText" />
          Sembunyikan dengan pesan</label
        ><br />
        <label
          ><input type="radio" name="filterMode" value="showWithLabel" />
          Tampilkan dengan label peringatan</label
        ><br />
        <label
          ><input type="radio" name="filterMode" value="hideCompletely" />
          Sembunyikan sepenuhnya</label
        >
      </div>
    </div>

    <button id="runButton">Jalankan</button>

    <script src="popup.js"></script>
  </body>
</html>
